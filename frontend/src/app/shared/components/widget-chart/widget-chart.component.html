<div class="chart-container" *ngIf="widget; else noData">
  <div *ngIf="widget.config.chart_type === 'kpi'" class="kpi-card">
    <div class="kpi-value">{{ kpiValue }}</div>
    <div class="kpi-label">{{ widget.config.title }}</div>
  </div>
  
  <canvas #chartCanvas *ngIf="widget.config.chart_type !== 'kpi'"></canvas>
</div>

<ng-template #noData>
  <div class="no-chart-data">No chart data</div>
</ng-template>
