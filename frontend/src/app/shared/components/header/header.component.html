<header class="app-header">
  <div class="container header-content">
    <a routerLink="/" class="brand-identity">
     <!-- BRAND LOGO AREA (PERMANENTLY VISIBLE) -->
    
      <img src="assets/images/logo.png" alt="Logo" class="logo-img" />
      <span class="brand-name">Smart Data Visualizer</span>
    </a>

    <!-- DYNAMIC ROUTE TRACKING BREADCRUMB (PERMANENTLY ALIGNED LEFT) -->
    <div class="header-breadcrumb" *ngIf="pageTitle$ | async as title">
      <span class="breadcrumb-separator" *ngIf="title !== 'Smart Data Visualizer' && title !== 'Home'">/</span>
      <span class="page-title" *ngIf="title !== 'Smart Data Visualizer' && title !== 'Home'">
        {{ title }}
      </span>
    </div>

    <nav class="main-nav">
      <!-- Logged in state -->
      <ng-container *ngIf="currentUser; else loggedOut">
        <span class="user-greeting" *ngIf="shouldShowWelcomeMessage">Welcome, {{ currentUser!.role }}</span>
        <button (click)="logout()" class="btn-logout">Sign Out</button>

       <ng-container *ngIf="currentUser.role === 'admin'">
          <a routerLink="/builder">Builder</a>
          
          <a routerLink="/dashboards">My Dashboards</a>
          <a routerLink="/admin/users">User Management</a>
        
        </ng-container>

        <!-- Viewer links -->
        <ng-container *ngIf="currentUser.role === 'viewer'">
          <a routerLink="/viewer/dashboards">Dashboards</a>
          <a  routerLink="/viewer/profile">Profile</a>

        </ng-container>

      </ng-container>

      <!-- Logged out state -->
      <ng-template #loggedOut>
        <a routerLink="/features">Features</a>
        <a routerLink="/about">About</a>
        <a routerLink="/register" class="btn-register">Sign Up</a>
      </ng-template>
    </nav>
  </div>
</header>
