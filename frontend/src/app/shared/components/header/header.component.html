<header class="app-header">
  <div class="container header-content">
    <a routerLink="/" class="brand-identity">
      <img src="assets/images/logo.png" alt="Logo" class="logo-img" />
      <span class="brand-name">Smart Data Visualizer</span>
    </a>

    <nav class="main-nav">
      <!-- Visible when NOT logged in -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/features">Features</a>
        <a routerLink="/about">About</a>
        <a routerLink="/register" class="btn-register">Sign Up</a>
      </ng-container>

      <!-- Visible when logged in -->
      <ng-container *ngIf="isLoggedIn">
        <span class="user-greeting">Welcome, {{ role }}</span>
        <button (click)="logout()" class="btn-logout">Sign Out</button>

        <!-- Dashboard links based on role -->
        <a *ngIf="role === 'admin'" routerLink="/builder">Dashboard</a>
        <a *ngIf="role !== 'admin'" routerLink="/viewer">Dashboard</a>
      </ng-container>
    </nav>
  </div>
</header>
