<div [formGroup]="form" class="step-content">
  <h3>Filters (optional)</h3>
  <p class="hint">Add conditions to filter rows before aggregation/chart.</p>

  <div formArrayName="filters">
    <div *ngFor="let filter of filtersArray.controls; let i = index" [formGroup]="$any(filter)" class="filter-row">
      <mat-form-field appearance="fill" class="filter-field">
        <mat-label>Column</mat-label>
        <mat-select formControlName="column">
          <mat-option *ngFor="let col of columns" [value]="col.name">{{ col.name }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill" class="filter-field">
        <mat-label>Operator</mat-label>
        <mat-select formControlName="operator">
          <mat-option *ngFor="let op of operators" [value]="op">{{ op }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill" class="filter-field">
        <mat-label>Value</mat-label>
        <input matInput formControlName="value"
               *ngIf="!isOperatorMulti(filter.get('operator')?.value) && !isOperatorText(filter.get('operator')?.value)">
        <input matInput formControlName="value"
               *ngIf="isOperatorMulti(filter.get('operator')?.value)"
               placeholder="comma,separated,values">
        <input matInput formControlName="value"
               *ngIf="isOperatorText(filter.get('operator')?.value)"
               placeholder="%pattern%">
      </mat-form-field>

      <button mat-icon-button color="warn" (click)="removeFilter(i)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </div>

  <button mat-stroked-button (click)="addFilter()">
    <mat-icon>add</mat-icon> Add Filter
  </button>
</div>
