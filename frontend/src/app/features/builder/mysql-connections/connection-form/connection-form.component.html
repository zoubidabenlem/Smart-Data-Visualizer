<h2 mat-dialog-title>{{ isEdit ? 'Edit Connection' : 'New MySQL Connection' }}</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="connection-form">
  <mat-dialog-content>
    <div class="form-grid">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Connection Name</mat-label>
        <input matInput formControlName="name" placeholder="My Production DB">
        <mat-error *ngIf="form.get('name')?.invalid">Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Host</mat-label>
        <input matInput formControlName="host" placeholder="localhost">
        <mat-error *ngIf="form.get('host')?.invalid">Host is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Port</mat-label>
        <input matInput type="number" formControlName="port">
        <mat-error *ngIf="form.get('port')?.invalid">Valid port required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Database</mat-label>
        <input matInput formControlName="database" placeholder="mydb">
        <mat-error *ngIf="form.get('database')?.invalid">Database is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" placeholder="user">
        <mat-error *ngIf="form.get('username')?.invalid">Username is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" placeholder="••••••••">
        <mat-error *ngIf="form.get('password')?.invalid">
          {{ isEdit ? '' : 'Password is required' }}
        </mat-error>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
      <mat-spinner *ngIf="saving" diameter="20"></mat-spinner>
      {{ saving ? 'Saving...' : 'Save' }}
    </button>
  </mat-dialog-actions>
</form>
