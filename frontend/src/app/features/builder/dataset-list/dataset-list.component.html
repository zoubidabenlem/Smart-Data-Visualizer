<!-- Loading, error, and empty state -->
<div *ngIf="loading" class="loading">Loading datasets...</div>
<div *ngIf="error" class="error-message">{{ error }}</div>
<div *ngIf="!loading && datasets.length === 0" class="no-data">
  No datasets found. Upload one above.
</div>



<!-- Table wrapper -->
<div *ngIf="!loading && datasets.length > 0" class="datasets-table-wrapper">
  <table class="datasets-table">
    <thead>
      <tr>
        <th>Filename</th>
        <th>Rows</th>
        <th>Columns</th>
        <th>Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let ds of datasets">
        <td>
          <span class="status-dot" [class.refined]="ds.is_refined"></span>
          {{ ds.filename }}
          <!-- Embedded MySQL icon inside the filename cell -->
          <mat-icon *ngIf="ds.source_type === 'mysql'" matTooltip="MySQL dataset" style="vertical-align: middle; margin-left: 6px; font-size: 18px; color: #00758F;">
            dns
          </mat-icon>
        </td>
        <td>{{ ds.row_count }}</td>
        <td>{{ ds.col_count }}</td>
        <td>{{ ds.uploaded_at | date:'medium' }}</td>
        <td class="action-cell">
          <button class="menu-trigger" (click)="toggleMenu(ds.id)">⋮</button>
          <div class="action-menu" *ngIf="openMenuId === ds.id">
            <button (click)="onMenuAction('preview', ds.id)">Preview</button>
            <button (click)="onMenuAction('refine', ds.id)" [disabled]="ds.is_refined">Refine</button>
            <button (click)="onMenuAction('delete', ds.id)">Delete</button>
            <button (click)="onMenuAction('dashboard', ds.id)">Create Dashboard</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
