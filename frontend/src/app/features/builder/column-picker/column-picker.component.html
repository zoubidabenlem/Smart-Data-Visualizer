<div class="column-picker-container">
  <h2>Select Columns for Chart</h2>

  <div *ngIf="loading" class="loading">Loading columns...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div *ngIf="!loading && columns.length === 0" class="no-data">
    No columns available. Please refine your dataset first.
  </div>

  <form *ngIf="!loading && columns.length > 0" (ngSubmit)="onNext()">
    <div class="form-group">
      <label for="xColumn">X-Axis Column</label>
      <select id="xColumn" [(ngModel)]="selectedXColumn" name="xColumn" required>
        <option value="" disabled>-- Select a column --</option>
        <option *ngFor="let col of columns" [value]="col.name">
          {{ col.name }} ({{ col.type }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="yColumn">Y-Axis Column</label>
      <select id="yColumn" [(ngModel)]="selectedYColumn" name="yColumn" required>
        <option value="" disabled>-- Select a column --</option>
        <option *ngFor="let col of columns" [value]="col.name">
          {{ col.name }} ({{ col.type }})
        </option>
      </select>
    </div>

    <div class="actions">
      <button type="button" class="btn-secondary" (click)="onBack()">Back</button>
      <button type="submit" class="btn-primary" [disabled]="!selectedXColumn || !selectedYColumn">
        Next
      </button>
    </div>
  </form>
</div>
