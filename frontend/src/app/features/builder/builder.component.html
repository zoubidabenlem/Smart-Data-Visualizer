<ng-container ></ng-container>

<div class="builder-container" >
  
  <!-- ===== SLEEK META BAR & CONTROLS ===== -->
  <div class="dashboard-action-strip">
    <div class="meta-info">
      <span class="pulse-indicator"></span>
      <p class="strip-text">System operational. Ready to ingest and refine datasets.</p>
    </div>
    
    <div class="strip-controls">
      <!-- Direct trigger for the child upload process or standard data refresh -->
      <button class="btn-action-secondary" (click)="onUploadSuccess()">
        <span class="btn-icon">↷</span> Sync Datasets
      </button>
    </div>
  </div>

  <!-- ===== LAYOUT CANVAS GRID ===== -->
  <div class="dashboard-grid-canvas">
    
    <!-- Upload Section Wrapper -->
    <section class="upload-zone-wrapper">
      <app-dataset-upload (uploadSuccess)="onUploadSuccess()"></app-dataset-upload>
    </section>
  </div>
<div class="table-toolbar">
    <!-- Dataset List Table Wrapper -->
    <!-- Search bar -->
    <div class="search-bar">
    <input
      type="text"
      placeholder="Search datasets by filename..."
      [value]="searchTerm"
      (input)="onSearchInput($event)"
    />
  </div>
   <!-- Pagination controls -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button (click)="prevPage()" [disabled]="currentPage <= 1">Previous</button>
      <span>Page {{ currentPage }} of {{ totalPages }} ({{ totalItems }} total)</span>
      <button (click)="nextPage()" [disabled]="currentPage >= totalPages">Next</button>
    </div>

    <!-- Your existing dataset list (unchanged) -->
    

  </div>
  <app-dataset-list
        [datasets]="datasets"
        [loading]="isLoading"
        [error]="error"
        (preview)="openPreview($event)"
        (refine)="openRefine($event)"
        (delete)="onDeleteDataset($event)"
        (createDashboard)="createDashboard($event)"
      ></app-dataset-list>
  <!-- ===== FLOATING PREVIEW MODAL ===== -->
  <app-preview-modal
    *ngIf="selectedDatasetId"
    [datasetId]="selectedDatasetId"
    (close)="selectedDatasetId = null">
  </app-preview-modal>
  
</div>
