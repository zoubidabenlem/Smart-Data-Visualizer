<!-- Combined into a single cohesive title header block -->
<div mat-dialog-title class="dialog-header">
  <h2 class="dialog-title">Assign Dashboards</h2>
  <span class="dialog-subtitle">For user: <strong>{{data.user.email}}</strong></span>
</div>

<mat-dialog-content class="assign-dialog-content">
  <!-- Standardized search field block -->
  <mat-form-field appearance="outline" class="search-field-wrapper" subscriptSizing="dynamic">
    <mat-icon matPrefix class="search-icon">search</mat-icon>
    <input matInput [formControl]="searchControl" placeholder="Type to filter dashboards...">
  </mat-form-field>

  <!-- Cleaned wrapper layout -->
  <div class="selection-wrapper">
    <mat-selection-list #dashList [(ngModel)]="selectedDashboards" class="custom-selection-list">
      <!-- Added explicit line alignment options if needed -->
      <mat-list-option *ngFor="let dash of filteredDashboards" [value]="dash.id">
        <span class="option-text">{{ dash.title }}</span>
      </mat-list-option>
    </mat-selection-list>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="assign-dialog-actions">
  <button mat-button (click)="cancel()">Cancel</button>
  <!-- Maintained consistency with your green theme button class if applicable -->
  <button mat-flat-button class="btn-save" (click)="save()" [disabled]="saving">Save</button>
</mat-dialog-actions>
